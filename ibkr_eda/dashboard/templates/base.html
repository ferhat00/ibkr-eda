<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBKR Trade Analyzer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --sidebar-width: 280px;
      --brand-green: #00c853;
      --brand-red: #ff1744;
    }
    * { font-family: 'Inter', sans-serif; }
    body { background: #0d1117; overflow-x: hidden; }
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: #161b22;
      border-right: 1px solid #30363d;
      height: calc(100vh - 56px);
      overflow-y: auto;
      position: sticky;
      top: 56px;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .filter-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin-bottom: 0.35rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    .card-header {
      background: transparent;
      border-bottom: 1px solid #30363d;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .metric-card {
      text-align: center;
      padding: 1rem 0.5rem;
    }
    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .metric-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin-top: 0.25rem;
    }
    .metric-sub {
      font-size: 0.75rem;
      color: #8b949e;
    }
    .text-profit { color: var(--brand-green) !important; }
    .text-loss { color: var(--brand-red) !important; }
    .form-control-sm, .form-check-input { background-color: #0d1117; border-color: #30363d; }
    .form-check { margin-bottom: 0.15rem; }
    .form-check-label { font-size: 0.82rem; }
    .filter-group { max-height: 140px; overflow-y: auto; }
    .filter-group::-webkit-scrollbar { width: 4px; }
    .filter-group::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    .table-dark { --bs-table-bg: #161b22; --bs-table-border-color: #30363d; }
    .table-dark th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer; user-select: none; }
    .table-dark td { font-size: 0.82rem; }
    .sort-arrow { opacity: 0.3; font-size: 0.7rem; }
    .sort-arrow.active { opacity: 1; }
    .loading-spinner {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: #8b949e;
    }
    .status-pill {
      font-size: 0.75rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      color: #8b949e;
    }
    #toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg px-3">
    <span class="navbar-brand text-light">IBKR Trade Analyzer</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="status-pill" class="status-pill">Loading...</span>
      <button id="btn-reload-nav" class="btn btn-sm btn-outline-primary" title="Reload data">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="d-flex">
    <aside class="sidebar p-3">
      {% block sidebar %}{% endblock %}
    </aside>
    <main class="flex-grow-1 p-4" style="min-width: 0;">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
